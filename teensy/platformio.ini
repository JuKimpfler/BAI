; PlatformIO Konfiguration für Teensy 4.0
; =========================================
; Dokumentation: https://docs.platformio.org/en/latest/boards/teensy/teensy40.html

[env:teensy40]
platform  = teensy
board     = teensy40
framework = arduino

; Serieller Monitor (Baudrate muss mit Serial.begin() im Sketch übereinstimmen)
monitor_speed = 115200

; Bibliotheken (bei Bedarf ergänzen)
; lib_deps =
;   ...

; Compiler-Flags: Optimierung für Geschwindigkeit
build_flags =
    -O2
    -DTEENSY40
